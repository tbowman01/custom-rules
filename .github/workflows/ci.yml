name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run coverage
      - name: Enforce coverage thresholds
        run: |
          LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          FUNCS=$(jq '.total.functions.pct' coverage/coverage-summary.json)
          BRANCH=$(jq '.total.branches.pct' coverage/coverage-summary.json)
          STMTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
          test "$(printf '%.0f' "$LINES")" -ge 90
          test "$(printf '%.0f' "$FUNCS")" -ge 90
          test "$(printf '%.0f' "$BRANCH")" -ge 90
          test "$(printf '%.0f' "$STMTS")" -ge 90
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
