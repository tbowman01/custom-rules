# Generated by Copilot
# Custom Rules Configuration with Security and Exclusions
name: "secure-development"
version: "1.0.0"

# Global settings
settings:
  output_format: "json"
  verbose: false
  max_workers: 4
  backup_enabled: true

# Security configuration
security:
  # Commands that should NEVER be executed under any circumstances
  neverExecute:
    - "rm -rf /"
    - "del /f /s /q C:\\*"
    - "format c:"
    - "mkfs.*"
    - "sudo rm -rf"
    - ":(){ :|:& };:" # Fork bomb
    - "chmod -R 777 /"
    - "dd if=/dev/zero"
    - "shutdown"
    - "reboot"
    - "halt"
    - "> /dev/sda"
    - "cat /dev/urandom > /dev/sda"

  # Commands that are blocked but might have legitimate use cases
  blockedCommands:
    - "curl *://*/malware*"
    - "wget *://*/malware*"
    - "powershell -enc*"
    - 'bash -c "$(curl*'
    - "eval*"
    - "exec*"
    - "sudo *"
    - "su *"
    - "chmod 777*"
    - "chown root*"

  # Regex patterns that indicate potentially unsafe operations
  unsafePatterns:
    - "\\$\\([^)]*\\)" # Command substitution
    - "`[^`]*`" # Backtick command substitution
    - "\\$\\{[^}]*\\}" # Parameter expansion
    - ">[>&].*" # Output redirection
    - "\\|\\s*sh" # Piping to shell
    - "\\|\\s*bash" # Piping to bash
    - "\\|\\s*zsh" # Piping to zsh
    - "2>&1" # Error redirection
    - "\\&\\&" # Command chaining
    - "\\|\\|" # Command chaining

# File and directory exclusions
exclusions:
  # Specific files to always exclude
  files:
    - ".env"
    - ".env.local"
    - ".env.production"
    - ".env.staging"
    - "*.key"
    - "*.pem"
    - "*.p12"
    - "*.pfx"
    - "id_rsa"
    - "id_dsa"
    - "id_ecdsa"
    - "id_ed25519"
    - "known_hosts"
    - "authorized_keys"
    - "*.crt"
    - "*.csr"
    - "config.json"
    - "secrets.yaml"
    - "credentials.json"

  # Directories to always exclude
  directories:
    - "node_modules"
    - ".git"
    - "dist"
    - "build"
    - "coverage"
    - ".nyc_output"
    - "tmp"
    - "temp"
    - ".cache"
    - "vendor"
    - "target"
    - "bin"
    - "obj"
    - ".pytest_cache"
    - "__pycache__"
    - ".tox"
    - ".venv"
    - "venv"
    - ".idea"
    - ".vscode"

  # Glob patterns for exclusion
  patterns:
    - "**/node_modules/**"
    - "**/.git/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/*.log"
    - "**/*.tmp"
    - "**/coverage/**"
    - "**/.DS_Store"
    - "**/Thumbs.db"
    - "**/*.swp"
    - "**/*.swo"
    - "**/*~"
    - "**/*.bak"
    - "**/*.backup"
    - "**/core.*"
    - "**/*.dump"

  # File extensions to exclude
  extensions:
    - ".exe"
    - ".bat"
    - ".cmd"
    - ".com"
    - ".scr"
    - ".pif"
    - ".msi"
    - ".dll"
    - ".so"
    - ".dylib"
    - ".dmp"
    - ".core"
    - ".app"

# Rules configuration
rules:
  - name: "security-scanner"
    description: "Scan for security vulnerabilities"
    enabled: true
    severity: "error"
    config:
      checkSecrets: true
      checkCommands: true
      validatePatterns: true

  - name: "file-exclusion-validator"
    description: "Validate file exclusion patterns"
    enabled: true
    severity: "warning"
    config:
      respectGitignore: true
      checkHiddenFiles: false

# Output destinations
destinations:
  reports: "./reports"
  logs: "./logs"
  backups: "./backups"

# Integrations
integrations:
  git:
    enabled: true
    hooks:
      - "pre-commit"
      - "pre-push"
  ci_cd:
    enabled: true
